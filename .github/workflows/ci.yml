name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra evals

      - name: Build package
        run: uv build

      - name: Run unit tests
        run: uv run pytest

  evals-standalone:
    name: Standalone Evals
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra evals

      - name: Run standalone evals
        env:
          MODEL_PROVIDER: gemini
          GEMINI_MODEL: gemini-3.5-flash
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: uv run python -m evals.strands.run_evaluations embedded
