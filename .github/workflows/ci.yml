name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra evals

      - name: Build package
        run: uv build

      - name: Run unit tests
        run: uv run pytest

  evals-standalone:
    name: Standalone Evals
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra evals

      - name: Run standalone evals
        env:
          MODEL_PROVIDER: gemini
          GEMINI_MODEL: gemini-3.5-flash
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: uv run python -m evals.strands.run_evaluations embedded

  evals-langfuse:
    name: Langfuse Experiments
    runs-on: ubuntu-latest
    needs: evals-standalone

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra evals

      - name: Start Langfuse
        run: docker compose -f docker-compose-langfuse.yml up -d

      - name: Wait for Langfuse
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/public/health && echo "Langfuse ready" && exit 0
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "Langfuse did not become ready in time" && exit 1

      - name: Run Langfuse experiments
        env:
          MODEL_PROVIDER: gemini
          GEMINI_MODEL: gemini-3.5-flash
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LANGFUSE_PUBLIC_KEY: publickey-local
          LANGFUSE_SECRET_KEY: secretkey-local
          LANGFUSE_BASE_URL: http://localhost:3000
        run: uv run python -m evals.langfuse.run_experiment embedded
