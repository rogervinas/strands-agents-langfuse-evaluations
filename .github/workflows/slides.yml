name: Deploy Slides

on:
  push:
    branches: [main]
    paths: [.doc/SLIDES.md]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build slides
        uses: marp-team/marp-action@v2
        with:
          input: .doc/SLIDES.md
          output: public/index.html
          html: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
